<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bagger-Andi – Brand Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0E1014;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .scene { width: 960px; max-width: 100vw; }
    svg { width: 100%; height: auto; display: block; }

    /* ── Excavator arm dig cycle ── */
    @keyframes arm-dig {
      0%   { transform: rotate(-35deg); }
      15%  { transform: rotate(-35deg); }
      45%  { transform: rotate(30deg);  }
      65%  { transform: rotate(30deg);  }
      90%  { transform: rotate(-35deg); }
      100% { transform: rotate(-35deg); }
    }
    #arm-g {
      transform-box: view-box;
      transform-origin: 460px 338px;
      animation: arm-dig 4s cubic-bezier(.37,0,.63,1) infinite;
    }

    /* ── Dirt particles ── */
    @keyframes dirt {
      0%   { opacity: 0;   transform: translate(0,0)                               scale(0); }
      8%   { opacity: 0.9; transform: translate(0,0)                               scale(1); }
      60%  { opacity: 0.5; transform: translate(var(--tx), var(--ty))              scale(.6); }
      100% { opacity: 0;   transform: translate(calc(var(--tx)*1.6),calc(var(--ty)*1.6)) scale(.05); }
    }
    .dp { animation: dirt 4s ease-out infinite; opacity: 0; }
    .dp:nth-child(1) { animation-delay: 1.80s; }
    .dp:nth-child(2) { animation-delay: 2.00s; }
    .dp:nth-child(3) { animation-delay: 2.20s; }
    .dp:nth-child(4) { animation-delay: 2.35s; }

    /* ── Ambient glow pulse ── */
    @keyframes glow-pulse {
      0%, 100% { opacity: .25; }
      50%       { opacity: .55; }
    }
    #amb { animation: glow-pulse 3s ease-in-out infinite; }

    /* ── Exhaust smoke ── */
    @keyframes smoke {
      0%   { opacity: 0;   transform: translateY(0)   scale(.3); }
      20%  { opacity: .45; transform: translateY(-8px) scale(.8); }
      100% { opacity: 0;   transform: translateY(-28px) scale(1.4); }
    }
    .sm  { animation: smoke 2s ease-out infinite; opacity: 0; }
    .sm:nth-child(2) { animation-delay: .7s; }
    .sm:nth-child(3) { animation-delay: 1.4s; }

    /* ── Text entrance ── */
    @keyframes fade-slide {
      from { opacity: 0; transform: translateX(-35px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes line-grow {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }
    .t1 { animation: fade-slide .8s ease-out .1s  both; }
    .t2 { animation: fade-slide .8s ease-out .35s both; }
    .t3 { animation: fade-slide .8s ease-out .60s both; }
    .t4 { animation: fade-slide .8s ease-out .80s both; }
    .t5 { animation: fade-slide .8s ease-out 1.0s both; }
    .al {
      transform-box: view-box;
      transform-origin: 35px 210px;
      animation: line-grow .7s ease-out .9s both;
    }
  </style>
</head>
<body>
<div class="scene">
<svg viewBox="0 0 960 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F5A623"/>
      <stop offset="60%"  stop-color="#D4890A"/>
      <stop offset="100%" stop-color="#9E6208"/>
    </linearGradient>
    <linearGradient id="gArm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#D4890A"/>
      <stop offset="100%" stop-color="#F5B030"/>
    </linearGradient>
    <linearGradient id="gGround" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1C1408"/>
      <stop offset="100%" stop-color="#0E1014"/>
    </linearGradient>
    <linearGradient id="gTextFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0E1014" stop-opacity="1"/>
      <stop offset="75%"  stop-color="#0E1014" stop-opacity=".85"/>
      <stop offset="100%" stop-color="#0E1014" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow filter for excavator -->
    <filter id="excav-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft ambient glow -->
    <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <!-- Track clip -->
    <clipPath id="track-clip">
      <rect x="373" y="380" width="318" height="58" rx="26"/>
    </clipPath>
  </defs>

  <!-- ─── Ambient glow behind excavator ─── -->
  <ellipse id="amb" cx="530" cy="420" rx="220" ry="70"
           fill="#D4890A" filter="url(#soft-glow)"/>

  <!-- ─── Ground ─── -->
  <rect x="0" y="455" width="960" height="65" fill="url(#gGround)"/>
  <line x1="0" y1="455" x2="960" y2="455"
        stroke="#D4890A" stroke-width="1.5" opacity=".28"/>
  <!-- Pebbles -->
  <circle cx="115" cy="462" r="3.5" fill="#2A2010" opacity=".8"/>
  <circle cx="190" cy="466" r="2.5" fill="#2A2010" opacity=".8"/>
  <circle cx="152" cy="471" r="5"   fill="#2A2010" opacity=".8"/>
  <circle cx="248" cy="463" r="2"   fill="#2A2010" opacity=".8"/>
  <circle cx="88"  cy="473" r="3"   fill="#2A2010" opacity=".8"/>
  <circle cx="845" cy="461" r="2.5" fill="#2A2010" opacity=".8"/>
  <circle cx="875" cy="467" r="3"   fill="#2A2010" opacity=".8"/>

  <!-- ─── Dirt particles (sync with dig at 45-65% of 4s = ~1.8-2.6s) ─── -->
  <g>
    <circle class="dp" style="--tx:-48px;--ty:-68px" cx="415" cy="450" r="6"   fill="#6B4208"/>
    <circle class="dp" style="--tx:-22px;--ty:-88px" cx="407" cy="447" r="4.5" fill="#8A5810"/>
    <circle class="dp" style="--tx:-62px;--ty:-52px" cx="420" cy="453" r="3.5" fill="#503005"/>
    <circle class="dp" style="--tx:-36px;--ty:-78px" cx="403" cy="444" r="7"   fill="#7A4A0A"/>
  </g>

  <!-- ═══════════ EXCAVATOR ═══════════ -->
  <g id="excavator" filter="url(#excav-glow)">

    <!-- ─ Tracks (Lower Carriage) ─ -->
    <rect x="373" y="380" width="318" height="58" rx="26" fill="#161920"/>
    <rect x="373" y="380" width="318" height="58" rx="26"
          fill="none" stroke="#D4890A" stroke-width="5.5"/>
    <!-- Tread marks (clipped) -->
    <g clip-path="url(#track-clip)">
      <rect x="378" y="394" width="13" height="30" rx="2" fill="#D4890A" opacity=".28"/>
      <rect x="398" y="394" width="13" height="30" rx="2" fill="#D4890A" opacity=".28"/>
      <rect x="418" y="394" width="13" height="30" rx="2" fill="#D4890A" opacity=".28"/>
      <rect x="438" y="394" width="13" height="30" rx="2" fill="#D4890A" opacity=".28"/>
      <rect x="458" y="394" width="13" height="30" rx="2" fill="#D4890A" opacity=".28"/>
      <rect x="478" y="394" width="13" height="30" rx="2" fill="#D4890A" opacity=".28"/>
      <rect x="498" y="394" width="13" height="30" rx="2" fill="#D4890A" opacity=".28"/>
      <rect x="518" y="394" width="13" height="30" rx="2" fill="#D4890A" opacity=".28"/>
      <rect x="538" y="394" width="13" height="30" rx="2" fill="#D4890A" opacity=".28"/>
      <rect x="558" y="394" width="13" height="30" rx="2" fill="#D4890A" opacity=".28"/>
      <rect x="578" y="394" width="13" height="30" rx="2" fill="#D4890A" opacity=".28"/>
      <rect x="598" y="394" width="13" height="30" rx="2" fill="#D4890A" opacity=".28"/>
      <rect x="618" y="394" width="13" height="30" rx="2" fill="#D4890A" opacity=".28"/>
      <rect x="638" y="394" width="13" height="30" rx="2" fill="#D4890A" opacity=".28"/>
      <rect x="658" y="394" width="13" height="30" rx="2" fill="#D4890A" opacity=".28"/>
      <rect x="678" y="394" width="13" height="30" rx="2" fill="#D4890A" opacity=".28"/>
    </g>
    <!-- Front drive wheel -->
    <circle cx="402" cy="409" r="30" fill="#1C2029" stroke="#D4890A" stroke-width="5"/>
    <circle cx="402" cy="409" r="12" fill="#D4890A"/>
    <line x1="402" y1="379" x2="402" y2="397" stroke="#1C2029" stroke-width="3.5"/>
    <line x1="402" y1="421" x2="402" y2="439" stroke="#1C2029" stroke-width="3.5"/>
    <line x1="372" y1="409" x2="390" y2="409" stroke="#1C2029" stroke-width="3.5"/>
    <line x1="414" y1="409" x2="432" y2="409" stroke="#1C2029" stroke-width="3.5"/>
    <!-- Back idler wheel -->
    <circle cx="662" cy="409" r="30" fill="#1C2029" stroke="#D4890A" stroke-width="5"/>
    <circle cx="662" cy="409" r="12" fill="#D4890A"/>

    <!-- ─ Upper carriage body ─ -->
    <rect x="390" y="316" width="272" height="73" rx="9" fill="url(#gBody)"/>
    <!-- Top gloss highlight -->
    <rect x="393" y="319" width="266" height="18" rx="7" fill="rgba(255,255,255,.1)"/>

    <!-- ─ Counterweight (back/right) ─ -->
    <rect x="620" y="323" width="50" height="58" rx="7" fill="#8A5608"/>
    <rect x="620" y="323" width="50" height="14" rx="7" fill="rgba(255,255,255,.06)"/>

    <!-- ─ Operator cab ─ -->
    <rect x="548" y="257" width="92" height="72" rx="7" fill="url(#gBody)"/>
    <!-- Window glass -->
    <rect x="556" y="265" width="77" height="54" rx="5" fill="#0E1014" opacity=".82"/>
    <!-- Window glare -->
    <rect x="560" y="270" width="24" height="10" rx="3" fill="rgba(255,255,255,.14)"/>
    <rect x="562" y="284" width="12" height="30" rx="2" fill="rgba(255,255,255,.05)"/>
    <!-- Cab top strip -->
    <rect x="550" y="257" width="88" height="9" rx="5" fill="rgba(255,255,255,.12)"/>

    <!-- ─ Exhaust stack ─ -->
    <rect x="606" y="222" width="11" height="38" rx="4" fill="#8A5608"/>
    <circle cx="612" cy="219" r="8" fill="#0E1014" stroke="#8A5608" stroke-width="2.5"/>
    <!-- Smoke puffs -->
    <g>
      <circle class="sm" cx="612" cy="210" r="7" fill="#3A3A3A" opacity=".4"/>
      <circle class="sm" cx="614" cy="208" r="6" fill="#3A3A3A" opacity=".4"/>
      <circle class="sm" cx="610" cy="206" r="5" fill="#3A3A3A" opacity=".4"/>
    </g>

    <!-- ─ ARM GROUP (rotates around boom pivot at 460, 338) ─ -->
    <g id="arm-g">
      <!-- Boom: drawn horizontal-left from pivot (460,338) to (340,338) -->
      <rect x="340" y="327" width="120" height="22" rx="8" fill="url(#gArm)"/>
      <!-- Boom top highlight -->
      <rect x="342" y="329" width="116" height="8" rx="4" fill="rgba(255,255,255,.18)"/>
      <!-- Hydraulic cylinder above boom -->
      <rect x="355" y="317" width="93" height="10" rx="4" fill="#C07808" opacity=".75"/>
      <rect x="353" y="319" width="52" height="6"  rx="3" fill="#E09010" opacity=".45"/>

      <!-- Stick: hangs from boom left tip (≈348, 338) downward -->
      <rect x="339" y="338" width="18" height="92" rx="6" fill="#E89810"/>
      <!-- Stick highlight -->
      <rect x="341" y="340" width="7" height="88"  rx="3" fill="rgba(255,255,255,.13)"/>
      <!-- Stick cylinder -->
      <rect x="328" y="343" width="10" height="76" rx="4" fill="#C07808" opacity=".6"/>

      <!-- Bucket (trapezoid, opening faces lower-left) -->
      <polygon points="316,426 365,426 372,460 308,460" fill="#D4890A"/>
      <!-- Bucket interior shadow -->
      <polygon points="318,428 363,428 367,442 314,442" fill="rgba(0,0,0,.22)"/>
      <!-- Bucket top highlight -->
      <polygon points="318,427 361,427 357,436 320,436" fill="rgba(255,255,255,.12)"/>
      <!-- Bucket teeth -->
      <polygon points="309,460 319,460 316,475 306,475" fill="#B8700A"/>
      <polygon points="325,460 336,460 333,475 322,475" fill="#B8700A"/>
      <polygon points="342,460 353,460 351,475 340,475" fill="#B8700A"/>
      <polygon points="359,460 369,460 369,475 357,475" fill="#B8700A"/>

      <!-- Boom-stick joint pin -->
      <circle cx="348" cy="338" r="5.5" fill="#161920" stroke="#F5A623" stroke-width="2"/>
      <!-- Boom-body pivot pin -->
      <circle cx="460" cy="338" r="7.5" fill="#161920" stroke="#F5A623" stroke-width="2.5"/>
    </g>
    <!-- /arm-g -->

  </g>
  <!-- /excavator -->

  <!-- ─── Text backdrop (left-side gradient overlay so text is always readable) ─── -->
  <rect x="0" y="0" width="460" height="520" fill="url(#gTextFade)"/>

  <!-- ═══════════ BRAND TEXT ═══════════ -->

  <!-- "BAGGER" -->
  <text class="t1"
        x="35" y="196"
        font-family="Inter, 'Segoe UI', system-ui, sans-serif"
        font-size="80" font-weight="900" letter-spacing="-2"
        fill="white">BAGGER</text>

  <!-- Amber accent line -->
  <line class="al"
        x1="35" y1="210" x2="390" y2="210"
        stroke="#D4890A" stroke-width="3" stroke-linecap="round"/>

  <!-- "ANDI" in amber -->
  <text class="t2"
        x="35" y="290"
        font-family="Inter, 'Segoe UI', system-ui, sans-serif"
        font-size="80" font-weight="900" letter-spacing="-2"
        fill="#D4890A">ANDI</text>

  <!-- Company name -->
  <text class="t3"
        x="37" y="328"
        font-family="Inter, 'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="700" letter-spacing="4.5"
        fill="#7E8399">MICHAELIS · BAUSERVICE</text>

  <!-- Tagline -->
  <text class="t4"
        x="37" y="356"
        font-family="Inter, 'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="400" letter-spacing=".4"
        fill="#55596A">Ihr Profi für Tiefbau, Pflaster &amp; Gartengestaltung</text>

  <!-- Phone -->
  <text class="t5"
        x="37" y="395"
        font-family="Inter, 'Segoe UI', system-ui, sans-serif"
        font-size="14.5" font-weight="600" letter-spacing="1"
        fill="#D4890A">☎  0157 / 86841833</text>

  <!-- URL (subtle) -->
  <text class="t5"
        x="37" y="420"
        font-family="Inter, 'Segoe UI', system-ui, sans-serif"
        font-size="11" font-weight="400" letter-spacing=".4"
        fill="#404558">bagger-andi.de</text>

</svg>
</div>
</body>
</html>
